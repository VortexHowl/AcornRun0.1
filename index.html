<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zephyr Gauntlet</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black overflow-hidden select-none">
    <!-- UI Overlay Layer -->
    <div id="ui-layer" class="fixed inset-0 z-10 pointer-events-none flex flex-col items-center justify-between p-6">
        
        <!-- Header: Wallet & Stats -->
        <div class="w-full flex justify-between items-start pointer-events-auto">
            <div class="bg-black/50 border border-cyan-500/50 p-4 rounded-lg backdrop-blur-md">
                <h1 class="text-cyan-400 font-bold text-xl uppercase tracking-widest">Zephyr Gauntlet</h1>
                <div id="stats" class="text-purple-400 font-mono">
                    ZEP Balance: <span id="zep-balance">0.00</span>
                </div>
            </div>
            <button id="connect-wallet" class="bg-gradient-to-r from-cyan-600 to-purple-600 hover:from-cyan-500 hover:to-purple-500 px-6 py-2 rounded-full font-bold text-white transition-all shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                CONNECT WALLET
            </button>
        </div>

        <!-- Cosmic Shop (Hidden by default) -->
        <div id="cosmic-shop" class="hidden pointer-events-auto w-full max-w-2xl bg-white/5 border border-white/20 backdrop-blur-xl rounded-2xl p-8 shadow-2xl">
            <h2 class="text-3xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 mb-6">COSMIC UPGRADES</h2>
            <div class="grid grid-cols-3 gap-4">
                <button id="upg-speed" class="shop-btn flex flex-col items-center p-4 rounded-xl border border-white/10 bg-black/40 disabled:opacity-30">
                    <span class="text-cyan-300">Fire Rate</span>
                    <span class="text-xs text-white/50 mt-1">Req: 100 ZEP</span>
                </button>
                <button id="upg-damage" class="shop-btn flex flex-col items-center p-4 rounded-xl border border-white/10 bg-black/40 disabled:opacity-30">
                    <span class="text-purple-300">Damage</span>
                    <span class="text-xs text-white/50 mt-1">Req: 500 ZEP</span>
                </button>
                <button id="upg-fuel" class="shop-btn flex flex-col items-center p-4 rounded-xl border border-white/10 bg-black/40 disabled:opacity-30">
                    <span class="text-yellow-300">Max Fuel</span>
                    <span class="text-xs text-white/50 mt-1">Req: 1000 ZEP</span>
                </button>
            </div>
            <button id="close-shop" class="mt-8 w-full py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg">CONTINUE MISSION</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="hidden pointer-events-auto text-center">
            <h2 class="text-6xl font-black text-red-600 drop-shadow-2xl mb-4">CRITICAL FAILURE</h2>
            <p id="final-score" class="text-2xl text-white mb-8">Score: 0</p>
            <div class="flex gap-4">
                <button id="revive-btn" class="bg-green-600 hover:bg-green-500 px-8 py-4 rounded-xl font-bold text-white shadow-lg">
                    REVIVE (10 ZEP)
                </button>
                <button onclick="window.location.reload()" class="bg-gray-800 px-8 py-4 rounded-xl text-white">WIPE DATA</button>
            </div>
        </div>
    </div>

    <div id="game-container"></div>
    <script type="module" src="./main.js"></script>
</body>
</html>
